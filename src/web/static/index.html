<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather App Web</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1><span id="weather-title">Weather App</span> <span id="weather-emoji">☀️</span></h1>
    <div class="hero-emoji" id="hero-emoji">☀️</div>
    <div class="search-box">
      <input id="city" type="text" placeholder="Inserisci una città (es. Milano)" />
      <button id="search">Cerca</button>
    </div>
    <div id="message" class="message"></div>
    <div id="result" class="result"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
